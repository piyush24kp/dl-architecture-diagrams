  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2f5ded5e-c0f0-4fa6-90bf-30c2ff13f810\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n:root{\n  --bg:#0b0f1a;--bg2:#0e1322;--bg3:#141b2d;--line:#1e293b;--muted:#475569;--text:#e2e8f0;--dim:#94a3b8;\n  --a1:#f59e0b;--a2:#fbbf24;--orange:#f97316;--purple:#a855f7;--cyan:#06b6d4;--green:#22c55e;--blue:#60a5fa;--red:#ef4444;\n}\n*{box-sizing:border-box;margin:0;padding:0;}\nbody{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;\n  display:flex;flex-direction:column;min-height:100vh;\n  background-image:radial-gradient(ellipse 70% 45% at 50% -5%,rgba(245,158,11,0.07),transparent 70%);}\nbody:not(.ended){height:100vh;overflow-y:hidden;}\nbody.ended{overflow-y:auto;}\n\n/* ---------- header ---------- */\nheader{flex:none;display:flex;align-items:center;gap:18px;padding:13px 26px 11px;position:relative;height:66px;}\n.nav-back{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-decoration:none;\n  border:1px solid var(--line);border-radius:5px;padding:6px 11px;transition:.2s;white-space:nowrap;}\n.nav-back:hover{color:var(--a1);border-color:rgba(245,158,11,.5);}\n.head-titles{display:flex;flex-direction:column;line-height:1;}\n.title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;\n  background:linear-gradient(100deg,var(--a1),var(--orange));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}\n.subtitle{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}\n.head-eq{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--a1);\n  background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.22);padding:7px 13px;border-radius:7px;white-space:nowrap;}\nheader::after{content:'';position:absolute;left:26px;right:26px;bottom:0;height:1px;\n  background:linear-gradient(90deg,transparent,rgba(245,158,11,.4),var(--orange),transparent);opacity:.55;}\n\n/* ---------- main layout ---------- */\n.app{flex:none;height:calc(100vh - 66px);position:relative;overflow:hidden;}\n\n/* architecture zone (full ↔ docked-left, via transform) */\n.archZone{position:absolute;inset:0;overflow:hidden;transition:background .4s;}\n.app[data-mode=\"step\"] .archZone{background:rgba(255,255,255,.013);}\n.app[data-mode=\"step\"]::after{content:'';position:absolute;left:252px;top:0;bottom:0;width:1px;background:var(--line);z-index:2;pointer-events:none;}\n.arch-label{position:absolute;top:10px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;\n  font-size:8px;letter-spacing:1.5px;color:var(--muted);opacity:0;transition:opacity .4s;pointer-events:none;}\n.app[data-mode=\"step\"] .arch-label{opacity:1;right:auto;width:252px;}\n.start-hint{position:absolute;bottom:18px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;\n  font-size:11px;color:var(--a1);opacity:0;transition:opacity .4s;pointer-events:none;}\n.app[data-mode=\"start\"] .start-hint{opacity:.9;}\n\n/* the diagram itself */\n.arch{position:absolute;left:0;top:0;width:312px;transform-origin:0 0;transform:translate(0,0) scale(1);\n  display:flex;flex-direction:column;align-items:center;z-index:1;}\n.ab{position:relative;width:100%;border:1px solid #334155;border-radius:8px;background:var(--bg2);padding:8px 14px;text-align:center;\n  transition:border-color .3s,box-shadow .3s,background .3s;}\n.ab .t{font-family:'JetBrains Mono',monospace;font-size:11px;color:#cbd5e1;font-weight:600;}\n.ab .s{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-top:2px;}\n.ab[data-step]{cursor:pointer;}\n.ab[data-step]:hover{border-color:rgba(245,158,11,.45);}\n.aconn{width:2px;height:15px;background:linear-gradient(#334155,#1e293b);}\n.atokrow{display:flex;gap:5px;}\n.atok{border:1px solid var(--muted);border-radius:4px;padding:3px 9px;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);background:var(--bg2);}\n.atok.hot{border-color:var(--a1);color:var(--a1);background:rgba(245,158,11,.08);}\n.abranch{display:flex;flex-direction:column;align-items:center;width:100%;}\n.abranch .lab{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--muted);letter-spacing:1px;margin-bottom:5px;}\n.aqkv-row{display:flex;gap:12px;}\n.aqkv{border-radius:6px;padding:6px 15px;text-align:center;font-family:'JetBrains Mono',monospace;transition:box-shadow .3s,background .3s;}\n.aqkv .h{font-size:12px;font-weight:700;}.aqkv .l{font-size:7px;color:var(--muted);margin-top:1px;}\n.aqkv.q{border:1px solid var(--a1);background:rgba(245,158,11,.08);}.aqkv.q .h{color:var(--a1);}\n.aqkv.k{border:1px solid var(--purple);background:rgba(168,85,247,.08);}.aqkv.k .h{color:#c084fc;}\n.aqkv.v{border:1px solid var(--cyan);background:rgba(6,182,212,.08);}.aqkv.v .h{color:#22d3ee;}\n/* colour variants */\n.ab.amber{border-color:rgba(245,158,11,.45);}.ab.amber .t{color:var(--a2);}\n.ab.purple{border-color:rgba(168,85,247,.45);}.ab.purple .t{color:#c084fc;}\n.ab.green{border-color:rgba(34,197,94,.45);}.ab.green .t{color:#86efac;}\n.ab.cyan{border-color:rgba(6,182,212,.45);}.ab.cyan .t{color:#22d3ee;}\n.ab.orange{border-color:rgba(249,115,22,.45);}.ab.orange .t{color:#fb923c;}\n.ab.outp{border-color:rgba(34,197,94,.55);background:rgba(34,197,94,.1);}.ab.outp .t{color:#86efac;}\n/* states */\n.ab.active{border-color:var(--a1)!important;box-shadow:0 0 0 2px rgba(245,158,11,.28),0 0 26px rgba(245,158,11,.3);background:rgba(245,158,11,.12);}\n.ab.active .t{color:var(--a2);}\n.ab.active .aqkv{box-shadow:0 0 14px rgba(245,158,11,.25);}\n.ab.done{opacity:.96;}\n.ab.done .tick{opacity:1;}\n.tick{position:absolute;top:-7px;right:-7px;font-size:11px;opacity:0;}\n.ab.active .here{opacity:1;}\n.here{position:absolute;left:-19px;top:50%;transform:translateY(-50%);color:var(--a1);font-size:12px;opacity:0;transition:opacity .3s;\n  animation:nudge 1.1s ease-in-out infinite;}\n@keyframes nudge{50%{transform:translateY(-50%) translateX(3px);}}\n\n/* stage zone (right pane, overlay) */\n.stageZone{position:absolute;left:252px;top:0;right:0;bottom:0;display:flex;flex-direction:column;min-width:0;\n  opacity:0;pointer-events:none;overflow:hidden;z-index:3;}\n.app[data-mode=\"step\"] .stageZone{opacity:1;pointer-events:auto;}\n#scene{width:100%;flex:1;min-height:0;display:block;}\n.caption{margin:0 18px 74px;min-height:82px;background:rgba(12,17,30,.82);border:1px solid var(--line);\n  border-left:3px solid var(--a1);border-radius:10px;padding:11px 16px;pointer-events:none;\n  transition:opacity .35s,transform .35s;box-shadow:0 10px 30px rgba(0,0,0,.3);}\n.cap-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--a1);text-transform:uppercase;margin-bottom:5px;}\n.cap-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:.2px;}\n.cap-body{font-size:12px;color:var(--dim);line-height:1.5;text-wrap:pretty;}\n.cap-eq{display:inline-block;margin-top:7px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--a2);\n  background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.25);padding:4px 10px;border-radius:5px;}\n.caption.swap{opacity:0;transform:translateY(8px);}\n\n/* ---------- takeaways ---------- */\n.takeaways{display:none;max-width:1120px;margin:0 auto;padding:8px 26px 120px;}\nbody.ended .takeaways{display:block;animation:rise .5s ease;}\n@keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}\n.tk-head{text-align:center;margin:18px 0 22px;}\n.tk-head .h{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--green);}\n.tk-head .s{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:1px;margin-top:4px;}\n.tk-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}\n.tk-card{border:1px solid var(--line);border-radius:11px;background:var(--bg2);padding:16px 18px;}\n.tk-card.full{grid-column:1/-1;}\n.tk-card h4{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;\n  margin-bottom:13px;display:flex;align-items:center;gap:8px;}\n.tk-card ul{list-style:none;display:flex;flex-direction:column;gap:9px;}\n.tk-card li{font-size:12.5px;color:#cbd5e1;line-height:1.5;display:grid;grid-template-columns:15px 1fr;gap:8px;align-items:start;}\n.tk-card li .mk{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.5;}\n.tk-card li b{color:#f1f5f9;font-weight:600;}\n.adv{border-color:rgba(34,197,94,.28);}.adv h4{color:#4ade80;}.adv li .mk{color:var(--green);}\n.cha{border-color:rgba(245,158,11,.28);}.cha h4{color:var(--a2);}.cha li .mk{color:var(--a1);}\n.use{border-color:rgba(6,182,212,.28);}.use h4{color:#22d3ee;}.use li .mk{color:var(--cyan);}\n.var{border-color:rgba(168,85,247,.28);}.var h4{color:#c084fc;}.var li .mk{color:var(--purple);}\n.pit{border-color:rgba(239,68,68,.28);}.pit h4{color:#fca5a5;}.pit li .mk{color:var(--red);}\n.cmp h4{color:var(--dim);}\ntable.cmp-t{width:100%;border-collapse:collapse;font-size:12px;}\ntable.cmp-t th,table.cmp-t td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--line);vertical-align:top;}\ntable.cmp-t thead th{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}\ntable.cmp-t thead th.att{color:var(--a1);}\ntable.cmp-t td:first-child{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--dim);width:150px;}\ntable.cmp-t td.att{color:#f1f5f9;}\ntable.cmp-t tr:last-child td{border-bottom:none;}\n\n/* ---------- controls (floating pill) ---------- */\n.dock{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:9px;\n  padding:8px 13px;border:1px solid rgba(245,158,11,.3);border-radius:50px;background:rgba(8,12,22,.92);\n  backdrop-filter:blur(14px);box-shadow:0 10px 44px rgba(0,0,0,.55);white-space:nowrap;}\n.db{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.6px;padding:8px 15px;border-radius:30px;\n  border:1px solid;cursor:pointer;transition:.16s;text-transform:uppercase;user-select:none;background:transparent;color:var(--text);}\n.db:active{transform:scale(.95);}\n.db-n{background:var(--a1);border-color:var(--a2);color:#0a0a0a;font-weight:700;}\n.db-n:hover{box-shadow:0 0 18px rgba(245,158,11,.45);}\n.db-n:disabled{background:var(--bg3);border-color:var(--line);color:var(--muted);cursor:not-allowed;box-shadow:none;}\n.db-p{border-color:var(--line);color:var(--dim);}\n.db-p:hover:not(:disabled){border-color:var(--cyan);color:var(--cyan);}\n.db-p:disabled{opacity:.32;cursor:not-allowed;}\n.db-a{border-color:var(--orange);color:var(--orange);}\n.db-a.on{background:var(--orange);color:#0a0a0a;font-weight:700;}\n.db-r{border-color:var(--line);color:var(--muted);}\n.db-r:hover{border-color:var(--cyan);color:var(--cyan);}\n.dsep{width:1px;height:22px;background:var(--line);}\n.dbadge{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--a1);background:rgba(245,158,11,.08);\n  border:1px solid rgba(245,158,11,.25);padding:6px 13px;border-radius:20px;min-width:120px;text-align:center;}\n.kbd{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);border:1px solid var(--line);border-radius:4px;padding:2px 6px;}\n.dspeed{display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}\n.dspeed input{width:60px;accent-color:var(--a1);cursor:pointer;}\n.cursor{animation:blink 1s step-end infinite;}@keyframes blink{50%{opacity:0;}}\n\n@media(max-width:900px){\n  .head-eq{display:none;}\n  .stageZone{left:150px;}\n  .app[data-mode=\"step\"]::after{left:150px;}\n  .app[data-mode=\"step\"] .arch-label{width:150px;}\n  .tk-grid{grid-template-columns:1fr;}\n  .dspeed{display:none;}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header>\n  <a class=\"nav-back\" href=\"index.html\">← Library<\u002Fa>\n  <div class=\"head-titles\">\n    <div class=\"title\">Attention Mechanism<\u002Fdiv>\n    <div class=\"subtitle\">Scaled Dot-Product · Multi-Head · The core of every LLM<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"head-eq\">Attention(Q,K,V) = softmax(Q·Kᵀ / √dₖ) · V<\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"app\" data-mode=\"start\">\n  <div class=\"archZone\" id=\"archZone\">\n    <div class=\"arch-label\">ARCHITECTURE · YOU ARE HERE<\u002Fdiv>\n    <div class=\"arch\" id=\"arch\"><\u002Fdiv>\n    <div class=\"start-hint\">▶ press Begin to walk through the architecture, block by block<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stageZone\" id=\"stageZone\">\n    <svg id=\"scene\" viewBox=\"0 0 1000 500\" preserveAspectRatio=\"xMidYMid meet\"><\u002Fsvg>\n    <div class=\"caption\" id=\"caption\">\n      <div class=\"cap-eyebrow\" id=\"capEye\">Step<\u002Fdiv>\n      <div class=\"cap-title\" id=\"capTitle\">—<\u002Fdiv>\n      <div class=\"cap-body\" id=\"capBody\">—<\u002Fdiv>\n      <div class=\"cap-eq\" id=\"capEq\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ---------- end-of-page takeaways ---------- -->\n<div class=\"takeaways\" id=\"takeaways\">\n  <div class=\"tk-head\"><div class=\"h\">Takeaways<\u002Fdiv><div class=\"s\">why attention wins · where it hurts · how it's used<\u002Fdiv><\u002Fdiv>\n  <div class=\"tk-grid\">\n    <div class=\"tk-card adv\">\n      <h4>✓ Advantages<\u002Fh4>\n      <ul>\n        <li><span class=\"mk\">+<\u002Fspan><span><b>Long-range context.<\u002Fb> Any token attends to any other in a single hop — no information decay over distance.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">+<\u002Fspan><span><b>Fully parallel.<\u002Fb> The whole sequence is processed at once — trains far faster than recurrent models on GPUs.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">+<\u002Fspan><span><b>Interpretable.<\u002Fb> Attention weights reveal <i>what looks at what<\u002Fi> — a rare window into the model.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">+<\u002Fspan><span><b>Content-based routing.<\u002Fb> Relevance is learned dynamically per input, not fixed by position.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"tk-card cha\">\n      <h4>⚠ Challenges<\u002Fh4>\n      <ul>\n        <li><span class=\"mk\">!<\u002Fspan><span><b>O(n²) cost.<\u002Fb> Compute and memory grow quadratically with sequence length — long contexts get expensive.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">!<\u002Fspan><span><b>No order built in.<\u002Fb> Self-attention is permutation-invariant; it needs positional encodings.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">!<\u002Fspan><span><b>Memory-heavy.<\u002Fb> The KV cache at inference grows with context length.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">!<\u002Fspan><span><b>Data-hungry.<\u002Fb> Few inductive biases means it needs large datasets to generalise well.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"tk-card use\">\n      <h4>◆ Where it's used<\u002Fh4>\n      <ul>\n        <li><span class=\"mk\">›<\u002Fspan><span><b>LLMs.<\u002Fb> GPT, BERT, T5, LLaMA, Claude, Gemini — the entire Transformer family.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">›<\u002Fspan><span><b>Vision.<\u002Fb> ViT, CLIP, DINO, SAM — patches as tokens with global attention.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">›<\u002Fspan><span><b>Generative.<\u002Fb> Cross-attention conditions Stable Diffusion / DALL·E on text.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">›<\u002Fspan><span><b>Speech &amp; multimodal.<\u002Fb> Whisper, AudioLM, Flamingo, GPT-4o.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"tk-card var\">\n      <h4>⚡ Variants &amp; improvements<\u002Fh4>\n      <ul>\n        <li><span class=\"mk\">›<\u002Fspan><span><b>FlashAttention.<\u002Fb> IO-aware kernel — exact result, O(n) memory, much faster.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">›<\u002Fspan><span><b>MQA / GQA.<\u002Fb> Share K/V across heads → smaller cache, faster decoding (LLaMA-2/3).<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">›<\u002Fspan><span><b>Sparse / sliding-window.<\u002Fb> Longformer, BigBird, Mistral — attend locally to cut O(n²).<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">›<\u002Fspan><span><b>Linear attention &amp; RoPE/ALiBi.<\u002Fb> Performer for O(n); rotary/ALiBi for length generalisation.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"tk-card full cmp\">\n      <h4>⇄ Attention vs. the alternatives<\u002Fh4>\n      <table class=\"cmp-t\">\n        <thead><tr><th>Aspect<\u002Fth><th class=\"att\">Attention<\u002Fth><th>RNN / LSTM<\u002Fth><th>Convolution<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Long-range dependency<\u002Ftd><td class=\"att\">Direct, O(1) path<\u002Ftd><td>Fades with distance<\u002Ftd><td>Limited by kernel size<\u002Ftd><\u002Ftr>\n          <tr><td>Parallelism<\u002Ftd><td class=\"att\">Full sequence at once<\u002Ftd><td>Sequential — slow<\u002Ftd><td>Full<\u002Ftd><\u002Ftr>\n          <tr><td>Cost in length n<\u002Ftd><td class=\"att\">O(n²·d)<\u002Ftd><td>O(n·d²)<\u002Ftd><td>O(n·k·d)<\u002Ftd><\u002Ftr>\n          <tr><td>Sense of order<\u002Ftd><td class=\"att\">Needs positional enc.<\u002Ftd><td>Inherent<\u002Ftd><td>Local / relative<\u002Ftd><\u002Ftr>\n          <tr><td>Interpretability<\u002Ftd><td class=\"att\">Attention weights<\u002Ftd><td>Opaque hidden state<\u002Ftd><td>Feature maps<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <div class=\"tk-card full pit\">\n      <h4>✗ Common pitfalls<\u002Fh4>\n      <ul>\n        <li><span class=\"mk\">✗<\u002Fspan><span><b>Missing causal mask<\u002Fb> in a decoder — the model peeks at future tokens and \"cheats\" during training.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">✗<\u002Fspan><span><b>Dropping the √dₖ scaling<\u002Fb> — large dot products saturate softmax and gradients vanish.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">✗<\u002Fspan><span><b>Wrong padding mask<\u002Fb> — attending to PAD tokens silently corrupts the output.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">✗<\u002Fspan><span><b>Train/inference length mismatch<\u002Fb> in positional encodings — extrapolation degrades quality.<\u002Fspan><\u002Fli>\n        <li><span class=\"mk\">✗<\u002Fspan><span><b>Head reshape bugs<\u002Fb> — mixing up (batch, heads, seq, d_k) dims fails silently, not loudly.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"dock\">\n  <button class=\"db db-p\" id=\"btnPrev\">‹ Prev<\u002Fbutton>\n  <button class=\"db db-n\" id=\"btnNext\">▶ Begin<\u002Fbutton>\n  <span class=\"kbd\">Space<\u002Fspan>\n  <div class=\"dsep\"><\u002Fdiv>\n  <button class=\"db db-a\" id=\"btnAuto\">⚡ Auto<\u002Fbutton>\n  <div class=\"dsep\"><\u002Fdiv>\n  <div class=\"dbadge\" id=\"indicator\">Ready<span class=\"cursor\">_<\u002Fspan><\u002Fdiv>\n  <div class=\"dsep\"><\u002Fdiv>\n  <div class=\"dspeed\"><span>Speed<\u002Fspan><input type=\"range\" id=\"speed\" min=\"0.5\" max=\"2.5\" step=\"0.5\" value=\"1\"><span id=\"speedLbl\">1×<\u002Fspan><\u002Fdiv>\n  <div class=\"dsep\"><\u002Fdiv>\n  <button class=\"db db-r\" id=\"btnReset\">↺ Reset<\u002Fbutton>\n<\u002Fdiv>\n\n<script>\n/* ============================================================\n   Attention — animated walkthrough (architecture-dock layout)\n   ============================================================ */\nconst NS='http://www.w3.org/2000/svg';\nconst C={a1:'#f59e0b',a2:'#fbbf24',orange:'#f97316',purple:'#a855f7',cyan:'#06b6d4',\n  green:'#22c55e',blue:'#60a5fa',red:'#ef4444',muted:'#475569',dim:'#94a3b8',\n  line:'#1e293b',text:'#e2e8f0',bg2:'#0e1322'};\nconst TOKENS=['The','bank','by','the','river'];\nconst WEIGHTS=[0.05,0.09,0.05,0.05,0.76];\nconst RAW=[0.42,1.05,0.55,0.40,2.30];\nconst ATTN=[\n [0.62,0.10,0.10,0.10,0.08],\n [0.05,0.09,0.05,0.05,0.76],\n [0.18,0.10,0.46,0.16,0.10],\n [0.58,0.08,0.10,0.16,0.08],\n [0.10,0.08,0.20,0.08,0.54]];\n\nconst scene=document.getElementById('scene');\nconst gMain=document.createElementNS(NS,'g'); scene.appendChild(gMain);\nconst fx=document.createElementNS(NS,'g'); scene.appendChild(fx);\nconst appEl=document.querySelector('.app');\n\nlet speed=1, current=-1, busy=false, autoOn=false, phase='start';\nconst TOTAL=8;\n\n/* ---------- engine ---------- */\nfunction el(tag,attrs={},parent){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);(parent||gMain).appendChild(e);return e;}\nfunction txt(x,y,s,o={}){const t=el('text',Object.assign({x,y,'text-anchor':o.anchor||'middle','font-family':o.mono===false?'DM Sans':'JetBrains Mono','font-size':o.size||12,fill:o.fill||C.text,opacity:o.opacity==null?1:o.opacity},o.weight?{'font-weight':o.weight}:{}),o.parent);t.textContent=s;return t;}\nconst easeOut=p=>1-Math.pow(1-p,3);\nconst easeInOut=p=>p<.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;\nfunction wait(ms){return new Promise(r=>setTimeout(r,ms/speed));}\nfunction tween({from=0,to=1,dur=600,ease=easeOut,onUpdate,onDone}){\n  const D=Math.max(16,dur/speed),t0=performance.now();let done=false;\n  return new Promise(res=>{\n    function finish(){if(done)return;done=true;onUpdate&&onUpdate(to,1);onDone&&onDone();res();}\n    function f(){if(done)return;let p=Math.min(1,(performance.now()-t0)/D);onUpdate&&onUpdate(from+(to-from)*ease(p),p);if(p<1)requestAnimationFrame(f);else finish();}\n    requestAnimationFrame(f);setTimeout(finish,D+260);\n  });\n}\nfunction fade(node,to=1,dur=400){return tween({dur,onUpdate:v=>node.setAttribute('opacity',(to*v).toFixed(3))});}\nfunction appear(node,dur=420,dy=8){node.setAttribute('opacity',0);\n  const tr=node.getAttribute('transform')||'';const m=/translate\\(([-\\d.]+)[ ,]([-\\d.]+)\\)/.exec(tr);\n  const bx=m?+m[1]:0,by=m?+m[2]:0;\n  return tween({dur,onUpdate:(v,p)=>{node.setAttribute('opacity',v);node.setAttribute('transform',`translate(${bx},${by+dy*(1-p)})`+(tr.replace(/translate\\([^)]*\\)/,'')));}});\n}\nfunction flow(d,{color=C.a1,count=4,dur=950,r=3,trail=true,onDone}={}){\n  const p=el('path',{d,fill:'none',stroke:trail?color:'none','stroke-width':trail?1.4:0,'stroke-opacity':trail?0.18:0},fx);\n  const len=p.getTotalLength();\n  const dots=[];for(let i=0;i<count;i++)dots.push({c:el('circle',{r,fill:color,opacity:0},fx),off:i/count*0.5});\n  const D=dur/speed,t0=performance.now();let done=false;\n  return new Promise(res=>{\n    function cleanup(){if(done)return;done=true;dots.forEach(x=>x.c.remove());\n      if(trail)tween({dur:300,onUpdate:v=>p.setAttribute('stroke-opacity',0.18*(1-v)),onDone:()=>p.remove()});else p.remove();\n      onDone&&onDone();res();}\n    function f(){if(done)return;let base=(performance.now()-t0)/D;\n      if(base>1.25){cleanup();return;}\n      dots.forEach(dt=>{let q=base-dt.off;if(q<0||q>1){dt.c.setAttribute('opacity',0);return;}\n        const pt=p.getPointAtLength(q*len);dt.c.setAttribute('cx',pt.x);dt.c.setAttribute('cy',pt.y);\n        dt.c.setAttribute('opacity',Math.sin(q*Math.PI).toFixed(3));});\n      requestAnimationFrame(f);}\n    requestAnimationFrame(f);setTimeout(cleanup,D*1.25+260);\n  });\n}\nfunction curve(x1,y1,x2,y2,k=0.5){const cx=x1+(x2-x1)*0.5;return `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`;}\nfunction chip(x,y,w,h,label,color,o={}){\n  const g=el('g',{transform:`translate(${x},${y})`,opacity:0},o.parent);\n  el('rect',{x:0,y:0,width:w,height:h,rx:o.rx==null?7:o.rx,fill:(o.solid?color+'22':color+'14'),stroke:color,'stroke-width':o.sw||1.5},g);\n  const t=el('text',{x:w/2,y:h/2+(o.fs||12)*0.36,'text-anchor':'middle','font-family':'JetBrains Mono','font-size':o.fs||12,fill:o.tc||color},g);\n  t.textContent=label;\n  return {g,cx:x+w/2,cy:y+h/2,x,y,w,h};\n}\nfunction tokenRow(y,h){const w=110,gap=20,total=5*w+4*gap,x0=(1000-total)/2;\n  return TOKENS.map((t,i)=>({x:x0+i*(w+gap),y,w,h,cx:x0+i*(w+gap)+w/2,cy:y+h/2,label:t}));}\nfunction clearScene(){gMain.innerHTML='';fx.innerHTML='';}\n\n/* ============================================================\n   STEP CAPTIONS + ANIMATIONS  (the right-pane motion)\n   ============================================================ */\nconst CAPTIONS=[\n ['01 · The Core Idea','Every word asks a question','A word like “bank” is ambiguous on its own. Attention lets each token look at the others and pull in the context it needs to resolve its meaning.','“bank” + “river” → river bank, not money'],\n ['02 · Q · K · V','Three learned projections','Each token embedding is multiplied by learned weight matrices to produce a Query, a Key, and a Value vector — three roles for the same word.','Q = x·W_Q   K = x·W_K   V = x·W_V'],\n ['03 · Dot-Product Scores','Compare the query to every key','The Query for “bank” takes a dot product with every Key. A larger dot product means the two tokens are more relevant to each other.','score(i,j) = Qᵢ · Kⱼᵀ'],\n ['04 · Scale + Softmax','Turn scores into probabilities','Divide by √dₖ so gradients stay stable, then softmax squashes the scores into attention weights that sum to exactly 1.','softmax( Q·Kᵀ / √dₖ )'],\n ['05 · Attention Map','Where every word looks','Run it for all queries and you get the full attention matrix. “bank” lights up on “river” — the model has disambiguated the word.','each row sums to 1.0'],\n ['06 · Weighted Sum','Blend the value vectors','Each output is the weighted sum of the Value vectors, using the attention weights. “bank” becomes a blend dominated by “river”.','output = Σ wⱼ · Vⱼ'],\n ['07 · Multi-Head','Many heads, many patterns','In practice h heads run in parallel — each learns a different relationship. Their outputs are concatenated and mixed by W_O.','MHA = Concat(head₁…headₕ) · W_O'],\n ['08 · Full Formula','The heart of every LLM','Assembled, this is scaled dot-product attention. Unlike an RNN it processes the whole sequence in parallel — which is why Transformers scale.','Attention(Q,K,V) = softmax(QKᵀ/√dₖ)·V'],\n];\n\nasync function step1(){\n  const bank=chip(440,250,120,66,'\"bank\"',C.a1,{fs:18,solid:true});\n  await appear(bank.g,500);\n  const ring=el('circle',{cx:500,cy:283,r:46,fill:'none',stroke:C.a1,'stroke-width':1.4,opacity:0});\n  let cyc=0;\n  (function pulse(){tween({from:0,to:1,dur:1600,ease:easeOut,onUpdate:v=>{ring.setAttribute('r',46+v*40);ring.setAttribute('opacity',(0.5*(1-v)).toFixed(3));},onDone:()=>{if(gMain.contains(ring)&&++cyc<3)pulse();else ring.setAttribute('opacity',0);}});})();\n  const fin=chip(120,90,250,72,'',C.blue,{parent:gMain});\n  txt(125,30,'“I deposited money at the bank”',{size:10,fill:C.blue,parent:fin.g});\n  txt(125,52,'→ FINANCE',{size:10,fill:C.dim,weight:700,parent:fin.g});\n  const geo=chip(630,360,250,72,'',C.green,{parent:gMain});\n  txt(125,30,'“We fished by the river bank”',{size:10,fill:C.green,parent:geo.g});\n  txt(125,52,'→ GEOGRAPHY',{size:10,fill:C.dim,weight:700,parent:geo.g});\n  await wait(150);\n  await appear(fin.g,460);\n  await flow(curve(370,126,440,275),{color:C.blue,count:4,dur:850});\n  await appear(geo.g,460);\n  await flow(curve(630,396,560,290),{color:C.green,count:4,dur:850});\n  const v=chip(360,440,280,44,'context decides the meaning',C.a2,{fs:12,tc:C.a2,parent:gMain});\n  await appear(v.g,460);\n}\nasync function step2(){\n  const row=tokenRow(54,46);\n  const chips=row.map(r=>chip(r.x,r.y,r.w,r.h,'\"'+r.label+'\"',r.label==='bank'?C.a1:C.dim,{fs:12,tc:r.label==='bank'?C.a1:C.text}));\n  for(const c of chips){appear(c.g,260);await wait(70);}\n  const band=el('g',{opacity:0});gMain.appendChild(band);\n  el('rect',{x:150,y:180,width:700,height:40,rx:8,fill:C.purple,opacity:0.05},band);\n  el('rect',{x:150,y:180,width:700,height:40,rx:8,fill:'none',stroke:C.purple,'stroke-width':1.3,'stroke-dasharray':'4 4'},band);\n  txt(500,205,'LINEAR  PROJECTION   ×  W_Q   W_K   W_V   (learned)',{size:11,fill:C.purple,parent:band});\n  await appear(band,420);\n  const kinds=[['Q',C.a1],['K',C.purple],['V',C.cyan]];\n  for(let i=0;i<5;i++){\n    const cx=row[i].cx;\n    flow(`M${cx},100 L${cx},180`,{color:C.dim,count:3,dur:600,trail:false});\n    await wait(120);\n    for(let k=0;k<3;k++){\n      const col=cx-78+k*52;\n      const sq=chip(col,290+k*44,46,30,kinds[k][0],kinds[k][1],{fs:12,rx:5});\n      flow(`M${cx},220 L${col+23},${290+k*44}`,{color:kinds[k][1],count:2,dur:520,trail:false});\n      appear(sq.g,300);\n    }\n    await wait(60);\n  }\n  txt(500,478,'Q = what I’m looking for   ·   K = what I contain   ·   V = what I offer',{size:11,fill:C.muted});\n  await wait(200);\n}\nasync function step3(){\n  const q=chip(70,250,150,64,'Q(\"bank\")',C.a1,{fs:14,solid:true});\n  await appear(q.g,420);\n  txt(145,330,'the query asks…',{size:9,fill:C.muted,parent:gMain});\n  const ys=[56,148,240,332,420];\n  const kchips=TOKENS.map((t,i)=>chip(770,ys[i],160,48,'K(\"'+t+'\")',C.purple,{fs:12}));\n  for(const k of kchips){appear(k.g,240);await wait(60);}\n  await wait(120);\n  for(let i=0;i<5;i++){\n    const d=curve(220,282,770,ys[i]+24,0.4);\n    flow(d,{color:i===4?C.green:C.a1,count:2+Math.round(WEIGHTS[i]*8),dur:1000,r:i===4?3.4:2.6});\n  }\n  await wait(620);\n  for(let i=0;i<5;i++){\n    const hi=i===4;\n    const s=chip(625,ys[i]+4,120,40,'score '+RAW[i].toFixed(2),hi?C.green:C.muted,{fs:11,tc:hi?C.green:C.dim});\n    appear(s.g,260);await wait(70);\n  }\n  txt(500,484,'“river” scores highest → most relevant to “bank”',{size:11,fill:C.green});\n  await wait(160);\n}\nasync function step4(){\n  const bx=180,bw=128,gap=20,baseY=430;\n  const cols=TOKENS.map((t,i)=>({x:bx+i*(bw+gap),label:t}));\n  el('line',{x1:150,y1:baseY,x2:920,y2:baseY,stroke:C.line,'stroke-width':1.2});\n  const maxRaw=Math.max(...RAW);\n  const bars=cols.map((c,i)=>{\n    const g=el('g',{});\n    const rect=el('rect',{x:c.x,y:baseY,width:bw,height:0,rx:4,fill:C.a1,opacity:0.85},g);\n    txt(c.x+bw/2,baseY+22,'\"'+c.label+'\"',{size:10,fill:C.muted,parent:g});\n    const val=txt(c.x+bw/2,baseY-6,'',{size:11,fill:C.a2,weight:700,parent:g});\n    return {rect,val,x:c.x};\n  });\n  const lab=txt(500,90,'RAW  SCORES   (Q·Kᵀ)',{size:13,fill:C.a1,weight:700});\n  await tween({dur:700,onUpdate:p=>{bars.forEach((b,i)=>{const h=RAW[i]/maxRaw*300*p;b.rect.setAttribute('y',baseY-h);b.rect.setAttribute('height',h);b.val.setAttribute('y',baseY-h-6);b.val.textContent=(RAW[i]*p).toFixed(2);});}});\n  await wait(400);\n  lab.textContent='÷ √dₖ   (scale down · dₖ=64 → √dₖ=8)';lab.setAttribute('fill',C.purple);\n  await tween({dur:650,onUpdate:p=>{bars.forEach((b,i)=>{const f=1-0.55*p;const h=RAW[i]/maxRaw*300*f;b.rect.setAttribute('y',baseY-h);b.rect.setAttribute('height',h);b.rect.setAttribute('fill',C.purple);b.val.setAttribute('y',baseY-h-6);b.val.textContent=(RAW[i]/8).toFixed(2);});}});\n  await wait(400);\n  lab.textContent='SOFTMAX  →  weights sum to 1.0';lab.setAttribute('fill',C.green);\n  const startH=RAW.map(r=>r/maxRaw*300*0.45);\n  await tween({dur:850,ease:easeInOut,onUpdate:p=>{bars.forEach((b,i)=>{const h=startH[i]+(WEIGHTS[i]*330-startH[i])*p;b.rect.setAttribute('y',baseY-h);b.rect.setAttribute('height',Math.max(0,h));const col=i===4?C.green:C.a1;b.rect.setAttribute('fill',col);b.val.setAttribute('y',baseY-h-6);b.val.setAttribute('fill',col);b.val.textContent=(WEIGHTS[i]*p).toFixed(2);});}});\n  const sumtag=chip(700,70,180,44,'Σ weights = 1.00 ✓',C.green,{fs:12,tc:C.green,parent:gMain});\n  await appear(sumtag.g,360);\n  await wait(150);\n}\nasync function step5(){\n  const n=5,cell=64,gx=320,gy=110,gap=4;\n  txt(500,70,'ATTENTION  MATRIX   ·   rows = query · columns = key',{size:12,fill:C.a1,weight:700});\n  TOKENS.forEach((t,c)=>txt(gx+c*(cell+gap)+cell/2,gy-12,t,{size:9,fill:C.muted}));\n  TOKENS.forEach((t,r)=>txt(gx-14,gy+r*(cell+gap)+cell/2+3,t,{size:9,fill:C.muted,anchor:'end'}));\n  for(let r=0;r<n;r++)for(let c=0;c<n;c++){\n    const v=ATTN[r][c];const x=gx+c*(cell+gap),y=gy+r*(cell+gap);const hi=(r===1&&c===4);\n    el('rect',{x,y,width:cell,height:cell,rx:5,fill:C.bg2,stroke:C.line,'stroke-width':1});\n    const rect=el('rect',{x,y,width:cell,height:cell,rx:5,fill:C.a1,'fill-opacity':0,stroke:hi?C.green:'none','stroke-width':hi?2.5:0});\n    const t=txt(x+cell/2,y+cell/2+4,v.toFixed(2),{size:11,fill:C.dim,opacity:0});\n    tween({dur:280,onUpdate:p=>{rect.setAttribute('fill-opacity',(v*p).toFixed(3));t.setAttribute('opacity',p.toFixed(3));t.setAttribute('fill',v>0.42?'#0a0a0a':C.text);}});\n    await wait(34);\n  }\n  await wait(150);\n  const cap=chip(690,250,250,60,'',C.green,{parent:gMain});\n  txt(125,26,'row \"bank\" → col \"river\"',{size:11,fill:C.green,parent:cap.g});\n  txt(125,46,'weight 0.76  ·  disambiguated',{size:10,fill:C.dim,parent:cap.g});\n  await appear(cap.g,420);\n}\nasync function step6(){\n  const ys=[50,140,230,320,410];\n  const vchips=TOKENS.map((t,i)=>{\n    const g=chip(70,ys[i],150,48,'V(\"'+t+'\")',C.cyan,{fs:12});\n    txt(255,ys[i]+20,'w = '+WEIGHTS[i].toFixed(2),{size:11,fill:i===4?C.green:C.muted,weight:i===4?700:400,parent:gMain});\n    return g;\n  });\n  for(const c of vchips){appear(c.g,200);await wait(60);}\n  const out=chip(640,250,250,72,'Output(\"bank\")',C.a1,{fs:14,solid:true,tc:C.text});\n  await appear(out.g,420);\n  const outRect=out.g.querySelector('rect');\n  await wait(150);\n  for(let i=0;i<5;i++){\n    flow(curve(330,ys[i]+24,640,286,0.35),{color:i===4?C.green:C.cyan,count:1+Math.round(WEIGHTS[i]*9),dur:1050,r:i===4?3.6:2.4});\n  }\n  tween({dur:1300,onUpdate:p=>{outRect.setAttribute('stroke',p>0.5?C.green:C.a1);outRect.setAttribute('fill',`color-mix(in srgb, ${C.a1} ${(100-p*60).toFixed(0)}%, ${C.green})`);}});\n  await wait(1100);\n  txt(765,360,'≈ 0.76·V(river) + small rest  →  river-bank context vector',{size:10.5,fill:C.green,parent:gMain});\n  await wait(150);\n}\nasync function step7(){\n  txt(500,56,'MULTI-HEAD  ATTENTION   ·   h = 8 heads in parallel',{size:12,fill:C.a1,weight:700});\n  const roles=['syntax','coreference','position','local','rare words','verbs','subject','long-range'];\n  const cols=4,mw=120,mh=120,gx=120,gy=100,gapx=70,gapy=40;\n  const heads=[];\n  for(let h=0;h<8;h++){\n    const cx=gx+(h%cols)*(mw+gapx),cy=gy+Math.floor(h/cols)*(mh+gapy);\n    const g=el('g',{transform:`translate(500,250) scale(0.2)`,opacity:0});gMain.appendChild(g);\n    el('rect',{x:0,y:0,width:mw,height:mh,rx:8,fill:C.bg2,stroke:C.line,'stroke-width':1.2},g);\n    for(let r=0;r<4;r++)for(let c=0;c<4;c++){\n      const v=Math.abs(Math.sin((h+1)*2.3+r*1.7+c*0.9))*0.9;\n      el('rect',{x:8+c*26,y:24+r*22,width:24,height:20,rx:3,fill:C.a1,'fill-opacity':v.toFixed(2)},g);\n    }\n    txt(mw/2,16,'Head '+(h+1),{size:9,fill:C.a2,parent:g});\n    txt(mw/2,mh-6,roles[h],{size:8,fill:C.muted,parent:g});\n    heads.push({g,cx,cy});\n  }\n  for(let i=0;i<heads.length;i++){\n    const h=heads[i];\n    tween({dur:560,ease:easeOut,onUpdate:(v,p)=>{const s=0.2+0.8*p;const x=500+(h.cx-500)*p;const y=250+(h.cy-250)*p;h.g.setAttribute('transform',`translate(${x},${y}) scale(${s})`);h.g.setAttribute('opacity',p);}});\n    await wait(120);\n  }\n  await wait(300);\n  const concat=chip(760,270,180,52,'Concat · W_O',C.green,{fs:13,tc:C.green});\n  appear(concat.g,420);\n  for(let h=0;h<8;h++){flow(curve(heads[h].cx+60,heads[h].cy+60,760,296,0.2),{color:C.a1,count:2,dur:900,r:2});}\n  await wait(700);\n  txt(850,345,'→ d_model output',{size:10,fill:C.muted,parent:gMain});\n  await wait(150);\n}\nasync function step8(){\n  const parts=[\n    {s:'Attention(Q,K,V) =',c:C.text,x:300},\n    {s:'softmax(',c:C.green,x:520},\n    {s:'Q·Kᵀ',c:C.a1,x:610},\n    {s:'/ √dₖ',c:C.purple,x:680},\n    {s:')',c:C.green,x:735},\n    {s:'· V',c:C.cyan,x:770},\n  ];\n  const y=210;\n  el('rect',{x:250,y:165,width:560,height:90,rx:12,fill:C.a1,'fill-opacity':0.04,stroke:'rgba(245,158,11,.3)','stroke-width':1.4,opacity:0});\n  fade(gMain.lastChild,1,500);\n  for(const p of parts){\n    const t=txt(p.x,y,p.s,{size:20,fill:p.c,weight:600,anchor:'start',opacity:0});\n    await tween({dur:300,onUpdate:(v,pr)=>{t.setAttribute('opacity',v);t.setAttribute('transform',`translate(0,${10*(1-pr)})`);}});\n    await wait(90);\n  }\n  const recap=[['Q·Kᵀ','similarity',C.a1],['÷√dₖ','stabilise',C.purple],['softmax','→ weights',C.green],['· V','blend values',C.cyan],['× h heads','rich patterns',C.orange]];\n  const rw=160,gap=14,total=5*rw+4*gap,x0=(1000-total)/2;\n  for(let i=0;i<recap.length;i++){\n    const g=chip(x0+i*(rw+gap),330,rw,58,'',recap[i][2],{parent:gMain});\n    txt(rw/2,27,recap[i][0],{size:13,fill:recap[i][2],weight:700,parent:g.g});\n    txt(rw/2,46,recap[i][1],{size:9.5,fill:C.muted,parent:g.g});\n    appear(g.g,300);await wait(90);\n  }\n  const ban=chip(300,432,400,50,'see the full takeaways below ↓',C.green,{fs:13,tc:C.green,parent:gMain});\n  await appear(ban.g,460);\n}\nconst STEPS=[step1,step2,step3,step4,step5,step6,step7,step8];\n\n/* ============================================================\n   ARCHITECTURE DIAGRAM  (full ↔ docked map)\n   ============================================================ */\nconst ARCH=[\n {id:'in',type:'tokens',step:0},\n {id:'emb',t:'Embedding + Positional',s:'token vectors'},\n {id:'qkv',type:'branch',step:1},\n {id:'mm1',t:'MatMul · Q·Kᵀ',s:'similarity scores',c:'amber',step:2},\n {id:'scale',t:'Scale · ÷ √dₖ',s:'stabilise gradients',c:'purple',step:3},\n {id:'soft',t:'Softmax',s:'→ attention weights',c:'green',step:4},\n {id:'mm2',t:'MatMul · V',s:'weighted sum of values',c:'cyan',step:5},\n {id:'mh',t:'Multi-Head · Concat·W_O',s:'h heads in parallel',c:'orange',step:6},\n {id:'out',t:'Output · context vectors',s:'',c:'outp',step:7},\n];\nfunction buildArch(){\n  const host=document.getElementById('arch');host.innerHTML='';\n  ARCH.forEach((b,i)=>{\n    if(i>0){const cn=document.createElement('div');cn.className='aconn';host.appendChild(cn);}\n    let node;\n    if(b.type==='tokens'){\n      node=document.createElement('div');node.className='atokrow';node.id='ab-'+b.id;\n      TOKENS.forEach(t=>{const k=document.createElement('div');k.className='atok'+(t==='bank'?' hot':'');k.textContent=t;node.appendChild(k);});\n    }else if(b.type==='branch'){\n      node=document.createElement('div');node.className='abranch';node.id='ab-'+b.id;\n      node.innerHTML='<div class=\"lab\">LINEAR PROJECTIONS<\u002Fdiv><div class=\"aqkv-row\">'+\n        '<div class=\"aqkv q\"><div class=\"h\">Q<\u002Fdiv><div class=\"l\">query<\u002Fdiv><\u002Fdiv>'+\n        '<div class=\"aqkv k\"><div class=\"h\">K<\u002Fdiv><div class=\"l\">key<\u002Fdiv><\u002Fdiv>'+\n        '<div class=\"aqkv v\"><div class=\"h\">V<\u002Fdiv><div class=\"l\">value<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n    }else{\n      node=document.createElement('div');node.className='ab '+(b.c||'');node.id='ab-'+b.id;\n      node.innerHTML='<div class=\"t\">'+b.t+'<\u002Fdiv>'+(b.s?'<div class=\"s\">'+b.s+'<\u002Fdiv>':'')+'<div class=\"tick\">✅<\u002Fdiv><div class=\"here\">▶<\u002Fdiv>';\n    }\n    if(b.step!=null){node.setAttribute('data-step',b.step);node.addEventListener('click',()=>jumpTo(b.step));}\n    host.appendChild(node);\n  });\n}\nfunction updateArch(activeStep,allDone){\n  const activeBlock=activeStep>=0?ARCH.find(b=>b.step===activeStep):null;\n  const activeIdx=activeBlock?ARCH.indexOf(activeBlock):-1;\n  ARCH.forEach((b,i)=>{\n    const n=document.getElementById('ab-'+b.id);if(!n)return;\n    n.classList.remove('active','done');\n    if(allDone)n.classList.add('done');\n    else if(activeIdx>=0){if(i<activeIdx)n.classList.add('done');if(b===activeBlock)n.classList.add('active');}\n  });\n}\nlet archState=null;\nfunction computeArchTarget(mode){\n  const arch=document.getElementById('arch');\n  const ah=arch.offsetHeight||520,aw=arch.offsetWidth||312;\n  const dockReserve=100,topPad=12;\n  const dockW=window.innerWidth<=900?150:252;\n  const regionH=appEl.clientHeight-dockReserve-topPad;\n  let s,X,Y;\n  if(mode==='step'){s=Math.min((dockW-22)/aw,regionH/ah);X=(dockW-aw*s)/2;Y=16;}\n  else{s=Math.min(1.0,(appEl.clientWidth-44)/aw,regionH/ah);X=(appEl.clientWidth-aw*s)/2;Y=topPad+(regionH-ah*s)/2;}\n  return {x:X,y:Y,s};\n}\nfunction applyArch(t){const arch=document.getElementById('arch');arch.style.transform=`translate(${t.x.toFixed(1)}px,${t.y.toFixed(1)}px) scale(${t.s.toFixed(3)})`;archState=t;}\nfunction layoutArch(mode,animate){\n  const t=computeArchTarget(mode);\n  if(!animate||!archState){applyArch(t);return;}\n  const f={x:archState.x,y:archState.y,s:archState.s};\n  tween({dur:560,ease:easeInOut,onUpdate:v=>{applyArch({x:f.x+(t.x-f.x)*v,y:f.y+(t.y-f.y)*v,s:f.s+(t.s-f.s)*v});}});\n}\n\n/* ============================================================\n   ORCHESTRATION\n   ============================================================ */\nfunction setMode(m){phase=m;appEl.dataset.mode=m;document.body.classList.toggle('ended',m==='end');layoutArch(m,true);}\nfunction setCaption(i){\n  const c=CAPTIONS[i],cap=document.getElementById('caption');\n  cap.classList.add('swap');\n  setTimeout(()=>{\n    document.getElementById('capEye').textContent=c[0];\n    document.getElementById('capTitle').textContent=c[1];\n    document.getElementById('capBody').textContent=c[2];\n    const eq=document.getElementById('capEq');eq.style.display='inline-block';eq.textContent=c[3];\n    cap.classList.remove('swap');\n  },170);\n}\nfunction setIndicator(){document.getElementById('indicator').innerHTML=(phase==='start'?'Ready':phase==='end'?'Complete ✓':'Step '+(current+1)+' / '+TOTAL)+'<span class=\"cursor\">_<\u002Fspan>';}\nfunction syncButtons(){\n  document.getElementById('btnPrev').disabled=busy||phase==='start';\n  const n=document.getElementById('btnNext');\n  if(phase==='start'){n.textContent='▶ Begin';n.disabled=false;}\n  else if(phase==='end'){n.textContent='↺ Restart';n.disabled=false;}\n  else if(current>=TOTAL-1){n.textContent='Summary ▸';n.disabled=busy;}\n  else{n.textContent='▶ Next Step';n.disabled=busy;}\n  document.getElementById('btnAuto').classList.toggle('on',autoOn);\n}\nasync function runStep(i){\n  busy=true;setMode('step');current=i;updateArch(i,false);setCaption(i);setIndicator();syncButtons();\n  clearScene();await wait(200);\n  await STEPS[i]();\n  busy=false;syncButtons();\n}\nfunction goEnd(){\n  autoOn=false;current=TOTAL-1;setMode('end');updateArch(-1,true);clearScene();setIndicator();syncButtons();\n  window.scrollTo({top:0,behavior:'auto'});\n}\nfunction afterAuto(){\n  if(!autoOn)return;\n  if(current<TOTAL-1)setTimeout(()=>{if(autoOn)next();},700/speed);\n  else setTimeout(()=>{if(autoOn){autoOn=false;goEnd();}},800/speed);\n}\nasync function next(){\n  if(busy)return;\n  if(phase==='end'){resetAll();return;}\n  if(phase==='step'&&current>=TOTAL-1){goEnd();return;}\n  const target=(phase==='start')?0:current+1;\n  await runStep(target);afterAuto();\n}\nasync function prev(){\n  if(busy)return;autoOn=false;\n  if(phase==='end'){await runStep(TOTAL-1);return;}\n  if(phase==='step'){if(current<=0)resetAll();else await runStep(current-1);}\n}\nfunction jumpTo(i){if(busy)return;autoOn=false;runStep(i);}\nfunction toggleAuto(){\n  if(phase==='end')resetAll();\n  autoOn=!autoOn;syncButtons();\n  if(autoOn)next();\n}\nfunction resetAll(){\n  autoOn=false;busy=false;current=-1;setMode('start');updateArch(-1,false);clearScene();\n  document.getElementById('capEq').style.display='none';\n  setIndicator();syncButtons();\n}\n\n/* events */\ndocument.getElementById('btnNext').addEventListener('click',next);\ndocument.getElementById('btnPrev').addEventListener('click',prev);\ndocument.getElementById('btnAuto').addEventListener('click',toggleAuto);\ndocument.getElementById('btnReset').addEventListener('click',resetAll);\ndocument.getElementById('speed').addEventListener('input',e=>{speed=parseFloat(e.target.value);document.getElementById('speedLbl').textContent=speed+'×';});\ndocument.addEventListener('keydown',e=>{\n  if(e.target.tagName==='INPUT')return;\n  if(e.code==='Space'||e.code==='ArrowRight'){e.preventDefault();next();}\n  else if(e.code==='ArrowLeft'){e.preventDefault();prev();}\n  else if(e.code==='KeyA'){e.preventDefault();toggleAuto();}\n  else if(e.code==='KeyR'){e.preventDefault();resetAll();}\n});\nwindow.addEventListener('resize',()=>layoutArch(appEl.dataset.mode,false));\n\nbuildArch();resetAll();\nfunction refit(){layoutArch(appEl.dataset.mode,false);}\nrequestAnimationFrame(refit);\nsetTimeout(refit,200);setTimeout(refit,500);\nwindow.addEventListener('load',refit);\nif(document.fonts&&document.fonts.ready)document.fonts.ready.then(refit);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
