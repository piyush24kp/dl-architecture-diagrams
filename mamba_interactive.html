<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAMBA — Animated Walkthrough</title>
<link rel="stylesheet" href="dl_engine.css">
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b0f1a">
<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b0f1a"/><g transform="translate(600,90)" fill="none"><rect x="-150" y="0" width="300" height="74" rx="14" fill="#0e1322" fill-opacity="1" stroke="#06b6d4" stroke-width="6"/><line x1="0" y1="74" x2="0" y2="120" stroke="#06b6d4" stroke-width="6"/><rect x="-150" y="120" width="300" height="74" rx="14" fill="#0e1322" fill-opacity="1" stroke="#f59e0b" stroke-width="6"/><line x1="0" y1="194" x2="0" y2="240" stroke="#f59e0b" stroke-width="6"/><rect x="-150" y="240" width="300" height="74" rx="14" fill="#0e1322" fill-opacity="1" stroke="#a855f7" stroke-width="6"/><line x1="0" y1="314" x2="0" y2="360" stroke="#a855f7" stroke-width="6"/><rect x="-150" y="360" width="300" height="74" rx="14" fill="#06b6d4" fill-opacity="0.16" stroke="#22c55e" stroke-width="6"/></g><text x="600" y="660" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="46" letter-spacing="5">MAMBA</text><text x="600" y="712" text-anchor="middle" fill="#475569" font-family="monospace" font-size="23" letter-spacing="2">selective state space</text></svg>
</template>
<header>
  <a class="nav-back" href="index.html">← Library</a>
  <div class="head-titles"><div class="title" id="hTitle">—</div><div class="subtitle" id="hSub">—</div></div>
  <div class="head-eq" id="hEq">—</div>
</header>
<div class="app" data-mode="start">
  <div class="archZone" id="archZone">
    <div class="arch-label">ARCHITECTURE · YOU ARE HERE</div>
    <div class="arch" id="arch"></div>
    <div class="start-hint">▶ press Begin to walk through the architecture, block by block</div>
  </div>
  <div class="stageZone" id="stageZone">
    <svg id="scene" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="caption" id="caption">
      <div class="cap-eyebrow" id="capEye">Step</div>
      <div class="cap-title" id="capTitle">—</div>
      <div class="cap-body" id="capBody">—</div>
      <div class="cap-eq" id="capEq"></div>
    </div>
  </div>
</div>
<div class="takeaways" id="takeaways"></div>
<div class="dock">
  <button class="db db-p" id="btnPrev">‹ Prev</button>
  <button class="db db-n" id="btnNext">▶ Begin</button>
  <span class="kbd">Space</span><div class="dsep"></div>
  <button class="db db-a" id="btnAuto">⚡ Auto</button><div class="dsep"></div>
  <div class="dbadge" id="indicator">Ready<span class="cursor">_</span></div><div class="dsep"></div>
  <div class="dspeed"><span>Speed</span><input type="range" id="speed" min="0.5" max="2.5" step="0.5" value="1"><span id="speedLbl">1×</span></div>
  <div class="dsep"></div>
  <button class="db db-r" id="btnReset">↺ Reset</button>
</div>
<script src="cfg/mamba.js"></script>
<script src="dl_engine.js"></script>
</body>
</html>
