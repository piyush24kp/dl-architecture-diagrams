<script>
/* ===== Attention config ===== */
const TOKENS=['The','bank','by','the','river'];
const WEIGHTS=[0.05,0.09,0.05,0.05,0.76];
const RAW=[0.42,1.05,0.55,0.40,2.30];
const ATTN=[[0.62,0.10,0.10,0.10,0.08],[0.05,0.09,0.05,0.05,0.76],[0.18,0.10,0.46,0.16,0.10],[0.58,0.08,0.10,0.16,0.08],[0.10,0.08,0.20,0.08,0.54]];
function tokenRow(y,h){const w=110,gap=20,total=5*w+4*gap,x0=(1000-total)/2;return TOKENS.map((t,i)=>({x:x0+i*(w+gap),y,w,h,cx:x0+i*(w+gap)+w/2,cy:y+h/2,label:t}));}

const DIAGRAM={
 title:'Attention Mechanism',
 subtitle:'Scaled Dot-Product · Multi-Head · The core of every LLM',
 formula:'Attention(Q,K,V) = softmax(Q·Kᵀ / √d&#8342;) · V',
 takeawaysSub:"why attention wins · where it hurts · how it's used",
 arch:[
  {id:'in',type:'tokens',items:TOKENS,hot:'bank',step:0},
  {id:'emb',t:'Embedding + Positional',s:'token vectors'},
  {id:'qkv',type:'split',label:'LINEAR PROJECTIONS',items:[{h:'Q',l:'query',cls:'q'},{h:'K',l:'key',cls:'k'},{h:'V',l:'value',cls:'v'}],step:1},
  {id:'mm1',t:'MatMul · Q·Kᵀ',s:'similarity scores',c:'amber',step:2},
  {id:'scale',t:'Scale · ÷ √dₖ',s:'stabilise gradients',c:'purple',step:3},
  {id:'soft',t:'Softmax',s:'→ attention weights',c:'green',step:4},
  {id:'mm2',t:'MatMul · V',s:'weighted sum of values',c:'cyan',step:5},
  {id:'mh',t:'Multi-Head · Concat·W_O',s:'h heads in parallel',c:'orange',step:6},
  {id:'out',t:'Output · context vectors',s:'',c:'outp',step:7},
 ],
 captions:[
  ['01 · The Core Idea','Every word asks a question','A word like “bank” is ambiguous on its own. Attention lets each token look at the others and pull in the context it needs to resolve its meaning.','“bank” + “river” → river bank, not money'],
  ['02 · Q · K · V','Three learned projections','Each token embedding is multiplied by learned weight matrices to produce a Query, a Key, and a Value vector — three roles for the same word.','Q = x·W_Q   K = x·W_K   V = x·W_V'],
  ['03 · Dot-Product Scores','Compare the query to every key','The Query for “bank” takes a dot product with every Key. A larger dot product means the two tokens are more relevant to each other.','score(i,j) = Qᵢ · Kⱼᵀ'],
  ['04 · Scale + Softmax','Turn scores into probabilities','Divide by √dₖ so gradients stay stable, then softmax squashes the scores into attention weights that sum to exactly 1.','softmax( Q·Kᵀ / √dₖ )'],
  ['05 · Attention Map','Where every word looks','Run it for all queries and you get the full attention matrix. “bank” lights up on “river” — the model has disambiguated the word.','each row sums to 1.0'],
  ['06 · Weighted Sum','Blend the value vectors','Each output is the weighted sum of the Value vectors, using the attention weights. “bank” becomes a blend dominated by “river”.','output = Σ wⱼ · Vⱼ'],
  ['07 · Multi-Head','Many heads, many patterns','In practice h heads run in parallel — each learns a different relationship. Their outputs are concatenated and mixed by W_O.','MHA = Concat(head₁…headₕ) · W_O'],
  ['08 · Full Formula','The heart of every LLM','Assembled, this is scaled dot-product attention. Unlike an RNN it processes the whole sequence in parallel — which is why Transformers scale.','Attention(Q,K,V) = softmax(QKᵀ/√dₖ)·V'],
 ],
 steps:[
  async function(){
    const bank=chip(440,250,120,66,'"bank"',C.a1,{fs:18,solid:true});
    await appear(bank.g,500);
    const ring=el('circle',{cx:500,cy:283,r:46,fill:'none',stroke:C.a1,'stroke-width':1.4,opacity:0});
    let cyc=0;(function pulse(){tween({from:0,to:1,dur:1600,ease:easeOut,onUpdate:v=>{ring.setAttribute('r',46+v*40);ring.setAttribute('opacity',(0.5*(1-v)).toFixed(3));},onDone:()=>{if(gMain.contains(ring)&&++cyc<3)pulse();else ring.setAttribute('opacity',0);}});})();
    const fin=chip(120,90,250,72,'',C.blue,{parent:gMain});
    txt(125,30,'“I deposited money at the bank”',{size:10,fill:C.blue,parent:fin.g});txt(125,52,'→ FINANCE',{size:10,fill:C.dim,weight:700,parent:fin.g});
    const geo=chip(630,360,250,72,'',C.green,{parent:gMain});
    txt(125,30,'“We fished by the river bank”',{size:10,fill:C.green,parent:geo.g});txt(125,52,'→ GEOGRAPHY',{size:10,fill:C.dim,weight:700,parent:geo.g});
    await wait(150);await appear(fin.g,460);await flow(curve(370,126,440,275),{color:C.blue,count:4,dur:850});
    await appear(geo.g,460);await flow(curve(630,396,560,290),{color:C.green,count:4,dur:850});
    const v=chip(360,440,280,44,'context decides the meaning',C.a2,{fs:12,tc:C.a2,parent:gMain});await appear(v.g,460);
  },
  async function(){
    const row=tokenRow(54,46);
    const chips=row.map(r=>chip(r.x,r.y,r.w,r.h,'"'+r.label+'"',r.label==='bank'?C.a1:C.dim,{fs:12,tc:r.label==='bank'?C.a1:C.text}));
    for(const c of chips){appear(c.g,260);await wait(70);}
    const band=el('g',{opacity:0});gMain.appendChild(band);
    el('rect',{x:150,y:180,width:700,height:40,rx:8,fill:C.purple,opacity:0.05},band);
    el('rect',{x:150,y:180,width:700,height:40,rx:8,fill:'none',stroke:C.purple,'stroke-width':1.3,'stroke-dasharray':'4 4'},band);
    txt(500,205,'LINEAR  PROJECTION   ×  W_Q   W_K   W_V   (learned)',{size:11,fill:C.purple,parent:band});
    await appear(band,420);
    const kinds=[['Q',C.a1],['K',C.purple],['V',C.cyan]];
    for(let i=0;i<5;i++){const cx=row[i].cx;flow(`M${cx},100 L${cx},180`,{color:C.dim,count:3,dur:600,trail:false});await wait(120);
      for(let k=0;k<3;k++){const col=cx-78+k*52;const sq=chip(col,290+k*44,46,30,kinds[k][0],kinds[k][1],{fs:12,rx:5});
        flow(`M${cx},220 L${col+23},${290+k*44}`,{color:kinds[k][1],count:2,dur:520,trail:false});appear(sq.g,300);}await wait(60);}
    txt(500,478,'Q = what I’m looking for   ·   K = what I contain   ·   V = what I offer',{size:11,fill:C.muted});await wait(200);
  },
  async function(){
    const q=chip(70,250,150,64,'Q("bank")',C.a1,{fs:14,solid:true});await appear(q.g,420);
    txt(145,330,'the query asks…',{size:9,fill:C.muted,parent:gMain});
    const ys=[56,148,240,332,420];const kchips=TOKENS.map((t,i)=>chip(770,ys[i],160,48,'K("'+t+'")',C.purple,{fs:12}));
    for(const k of kchips){appear(k.g,240);await wait(60);}await wait(120);
    for(let i=0;i<5;i++){flow(curve(220,282,770,ys[i]+24,0.4),{color:i===4?C.green:C.a1,count:2+Math.round(WEIGHTS[i]*8),dur:1000,r:i===4?3.4:2.6});}
    await wait(620);
    for(let i=0;i<5;i++){const hi=i===4;const s=chip(625,ys[i]+4,120,40,'score '+RAW[i].toFixed(2),hi?C.green:C.muted,{fs:11,tc:hi?C.green:C.dim});appear(s.g,260);await wait(70);}
    txt(500,484,'“river” scores highest → most relevant to “bank”',{size:11,fill:C.green});await wait(160);
  },
  async function(){
    const bx=180,bw=128,gap=20,baseY=430;const cols=TOKENS.map((t,i)=>({x:bx+i*(bw+gap),label:t}));
    el('line',{x1:150,y1:baseY,x2:920,y2:baseY,stroke:C.line,'stroke-width':1.2});const maxRaw=Math.max(...RAW);
    const bars=cols.map((c,i)=>{const g=el('g',{});const rect=el('rect',{x:c.x,y:baseY,width:bw,height:0,rx:4,fill:C.a1,opacity:0.85},g);
      txt(c.x+bw/2,baseY+22,'"'+c.label+'"',{size:10,fill:C.muted,parent:g});const val=txt(c.x+bw/2,baseY-6,'',{size:11,fill:C.a2,weight:700,parent:g});return {rect,val,x:c.x};});
    const lab=txt(500,90,'RAW  SCORES   (Q·Kᵀ)',{size:13,fill:C.a1,weight:700});
    await tween({dur:700,onUpdate:p=>{bars.forEach((b,i)=>{const h=RAW[i]/maxRaw*300*p;b.rect.setAttribute('y',baseY-h);b.rect.setAttribute('height',h);b.val.setAttribute('y',baseY-h-6);b.val.textContent=(RAW[i]*p).toFixed(2);});}});
    await wait(400);lab.textContent='÷ √dₖ   (scale down · dₖ=64 → √dₖ=8)';lab.setAttribute('fill',C.purple);
    await tween({dur:650,onUpdate:p=>{bars.forEach((b,i)=>{const f=1-0.55*p;const h=RAW[i]/maxRaw*300*f;b.rect.setAttribute('y',baseY-h);b.rect.setAttribute('height',h);b.rect.setAttribute('fill',C.purple);b.val.setAttribute('y',baseY-h-6);b.val.textContent=(RAW[i]/8).toFixed(2);});}});
    await wait(400);lab.textContent='SOFTMAX  →  weights sum to 1.0';lab.setAttribute('fill',C.green);
    const startH=RAW.map(r=>r/maxRaw*300*0.45);
    await tween({dur:850,ease:easeInOut,onUpdate:p=>{bars.forEach((b,i)=>{const h=startH[i]+(WEIGHTS[i]*330-startH[i])*p;b.rect.setAttribute('y',baseY-h);b.rect.setAttribute('height',Math.max(0,h));const col=i===4?C.green:C.a1;b.rect.setAttribute('fill',col);b.val.setAttribute('y',baseY-h-6);b.val.setAttribute('fill',col);b.val.textContent=(WEIGHTS[i]*p).toFixed(2);});}});
    const sumtag=chip(700,70,180,44,'Σ weights = 1.00 ✓',C.green,{fs:12,tc:C.green,parent:gMain});await appear(sumtag.g,360);await wait(150);
  },
  async function(){
    stageTitle('ATTENTION  MATRIX   ·   click any word to explore its attention',C.a1);
    const n=5,cell=58,gx=270,gy=106,gap=4;
    // Column labels
    TOKENS.forEach((t,c)=>txt(gx+c*(cell+gap)+cell/2,gy-14,t,{size:9,fill:C.muted}));
    // Draw matrix with stored refs
    const cellRects=[],cellTxts=[];
    for(let r=0;r<n;r++)for(let c=0;c<n;c++){
      const v=ATTN[r][c];const x=gx+c*(cell+gap),y=gy+r*(cell+gap);
      el('rect',{x,y,width:cell,height:cell,rx:4,fill:C.bg2,stroke:C.line,'stroke-width':1});
      const rect=el('rect',{x,y,width:cell,height:cell,rx:4,fill:C.a1,'fill-opacity':0});
      const tval=txt(x+cell/2,y+cell/2+4,v.toFixed(2),{size:10,fill:C.dim,opacity:0});
      cellRects.push(rect);cellTxts.push(tval);
      tween({dur:240,onUpdate:p=>{rect.setAttribute('fill-opacity',(v*p).toFixed(3));tval.setAttribute('opacity',p.toFixed(3));}});await wait(26);}
    // Info panel right of matrix
    const ipx=620,ipy=96,ipw=250;
    const ipBg=el('rect',{x:ipx,y:ipy,width:ipw,height:295,rx:9,fill:C.bg2,stroke:C.line,'stroke-width':1,opacity:0});
    const infoTitle=txt(ipx+ipw/2,ipy+22,'',{size:11,fill:C.a2,weight:700,opacity:0});
    const infoBars=TOKENS.map((tok,k)=>{
      const bar=el('rect',{x:ipx+8,y:ipy+38+k*48,width:0,height:28,rx:4,fill:C.a1,opacity:0});
      const bl=txt(ipx+6,ipy+58+k*48,'"'+tok+'"',{size:9,fill:C.dim,anchor:'start',opacity:0});
      const bv=txt(ipx+ipw-6,ipy+58+k*48,'',{size:9,fill:C.dim,anchor:'end',opacity:0});
      return {bar,bl,bv};});
    let activeRow=-1;const rowBtnData=[];
    function selectRow(r){
      if(activeRow===r)return;activeRow=r;
      const maxIdx=ATTN[r].indexOf(Math.max(...ATTN[r]));
      for(let ri=0;ri<n;ri++)for(let ci=0;ci<n;ci++){
        const idx=ri*n+ci,active=ri===r;
        cellRects[idx].setAttribute('fill',ri===r&&ci===maxIdx?C.green:C.a1);
        cellRects[idx].setAttribute('opacity',active?1:0.28);
        cellTxts[idx].setAttribute('opacity',active?'1':'0.14');}
      rowBtnData.forEach(({bg,lbl},i)=>{
        bg.setAttribute('fill-opacity',i===r?0.16:0);
        bg.setAttribute('stroke',i===r?C.a1:C.line);
        lbl.setAttribute('fill',i===r?C.a1:C.muted);});
      ipBg.setAttribute('opacity',1);infoTitle.setAttribute('opacity',1);
      infoTitle.textContent='"'+TOKENS[r]+'" attends to:';
      infoBars.forEach(({bar,bl,bv},k)=>{
        const hot=k===maxIdx;
        bar.setAttribute('opacity',1);bl.setAttribute('opacity',1);bv.setAttribute('opacity',1);
        tween({dur:300,onUpdate:p=>bar.setAttribute('width',(ATTN[r][k]*(ipw-18)*p).toFixed(1))});
        bar.setAttribute('fill',hot?C.green:C.a1);
        bl.setAttribute('fill',hot?C.green:C.dim);
        bv.textContent=ATTN[r][k].toFixed(2);bv.setAttribute('fill',hot?C.green:C.dim);});}
    // Clickable row labels
    TOKENS.forEach((tok,r)=>{
      const y=gy+r*(cell+gap);
      const bg=el('rect',{x:140,y,width:122,height:cell,rx:5,fill:C.a1,'fill-opacity':0,stroke:C.line,'stroke-width':1});
      const lbl=txt(258,y+cell/2+3,'"'+tok+'"',{size:10,fill:C.muted,anchor:'end'});
      bg.style.cursor='pointer';
      bg.addEventListener('mouseover',()=>{if(r!==activeRow)bg.setAttribute('fill-opacity',0.06);});
      bg.addEventListener('mouseout',()=>{if(r!==activeRow)bg.setAttribute('fill-opacity',0);});
      bg.addEventListener('click',()=>selectRow(r));
      rowBtnData.push({bg,lbl});});
    await wait(180);selectRow(1);  // auto-highlight "bank"
  },
  async function(){
    const ys=[50,140,230,320,410];
    const vchips=TOKENS.map((t,i)=>{const g=chip(70,ys[i],150,48,'V("'+t+'")',C.cyan,{fs:12});txt(255,ys[i]+20,'w = '+WEIGHTS[i].toFixed(2),{size:11,fill:i===4?C.green:C.muted,weight:i===4?700:400,parent:gMain});return g;});
    for(const c of vchips){appear(c.g,200);await wait(60);}
    const out=chip(640,250,250,72,'Output("bank")',C.a1,{fs:14,solid:true,tc:C.text});await appear(out.g,420);const outRect=out.g.querySelector('rect');await wait(150);
    for(let i=0;i<5;i++){flow(curve(330,ys[i]+24,640,286,0.35),{color:i===4?C.green:C.cyan,count:1+Math.round(WEIGHTS[i]*9),dur:1050,r:i===4?3.6:2.4});}
    tween({dur:1300,onUpdate:p=>{outRect.setAttribute('stroke',p>0.5?C.green:C.a1);outRect.setAttribute('fill',`color-mix(in srgb, ${C.a1} ${(100-p*60).toFixed(0)}%, ${C.green})`);}});
    await wait(1100);txt(765,360,'≈ 0.76·V(river) + small rest  →  river-bank context vector',{size:10.5,fill:C.green,parent:gMain});await wait(150);
  },
  async function(){
    stageTitle('MULTI-HEAD  ATTENTION   ·   h = 8 heads in parallel');
    const roles=['syntax','coreference','position','local','rare words','verbs','subject','long-range'];
    const cols=4,mw=120,mh=120,gx=120,gy=100,gapx=70,gapy=40;const heads=[];
    for(let h=0;h<8;h++){const cx=gx+(h%cols)*(mw+gapx),cy=gy+Math.floor(h/cols)*(mh+gapy);
      const g=el('g',{transform:`translate(500,250) scale(0.2)`,opacity:0});gMain.appendChild(g);
      el('rect',{x:0,y:0,width:mw,height:mh,rx:8,fill:C.bg2,stroke:C.line,'stroke-width':1.2},g);
      for(let r=0;r<4;r++)for(let c=0;c<4;c++){const v=Math.abs(Math.sin((h+1)*2.3+r*1.7+c*0.9))*0.9;el('rect',{x:8+c*26,y:24+r*22,width:24,height:20,rx:3,fill:C.a1,'fill-opacity':v.toFixed(2)},g);}
      txt(mw/2,16,'Head '+(h+1),{size:9,fill:C.a2,parent:g});txt(mw/2,mh-6,roles[h],{size:8,fill:C.muted,parent:g});heads.push({g,cx,cy});}
    for(let i=0;i<heads.length;i++){const h=heads[i];tween({dur:560,ease:easeOut,onUpdate:(v,p)=>{const s=0.2+0.8*p;const x=500+(h.cx-500)*p;const y=250+(h.cy-250)*p;h.g.setAttribute('transform',`translate(${x},${y}) scale(${s})`);h.g.setAttribute('opacity',p);}});await wait(120);}
    await wait(300);const concat=chip(760,270,180,52,'Concat · W_O',C.green,{fs:13,tc:C.green});appear(concat.g,420);
    for(let h=0;h<8;h++){flow(curve(heads[h].cx+60,heads[h].cy+60,760,296,0.2),{color:C.a1,count:2,dur:900,r:2});}
    await wait(700);txt(850,345,'→ d_model output',{size:10,fill:C.muted,parent:gMain});await wait(150);
  },
  async function(){
    const parts=[{s:'Attention(Q,K,V) =',c:C.text,x:300},{s:'softmax(',c:C.green,x:520},{s:'Q·Kᵀ',c:C.a1,x:610},{s:'/ √dₖ',c:C.purple,x:680},{s:')',c:C.green,x:735},{s:'· V',c:C.cyan,x:770}];
    const y=210;el('rect',{x:250,y:165,width:560,height:90,rx:12,fill:C.a1,'fill-opacity':0.04,stroke:'rgba(245,158,11,.3)','stroke-width':1.4,opacity:0});fade(gMain.lastChild,1,500);
    for(const p of parts){const t=txt(p.x,y,p.s,{size:20,fill:p.c,weight:600,anchor:'start',opacity:0});await tween({dur:300,onUpdate:(v,pr)=>{t.setAttribute('opacity',v);t.setAttribute('transform',`translate(0,${10*(1-pr)})`);}});await wait(90);}
    const recap=[['Q·Kᵀ','similarity',C.a1],['÷√dₖ','stabilise',C.purple],['softmax','→ weights',C.green],['· V','blend values',C.cyan],['× h heads','rich patterns',C.orange]];
    const rw=160,gap=14,total=5*rw+4*gap,x0=(1000-total)/2;
    for(let i=0;i<recap.length;i++){const g=chip(x0+i*(rw+gap),330,rw,58,'',recap[i][2],{parent:gMain});txt(rw/2,27,recap[i][0],{size:13,fill:recap[i][2],weight:700,parent:g.g});txt(rw/2,46,recap[i][1],{size:9.5,fill:C.muted,parent:g.g});appear(g.g,300);await wait(90);}
    const ban=chip(300,432,400,50,'see the full takeaways below ↓',C.green,{fs:13,tc:C.green,parent:gMain});await appear(ban.g,460);
  },

 takeaways:{
